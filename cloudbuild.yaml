substitutions:
  _REGION: us-central1
  _REPO: aisprint
  _BLOG_IMAGE: blog-site
  _ANALYSIS_IMAGE: blog-analysis

steps:
  - id: build-blog
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BLOG_IMAGE}:latest
      - .

  - id: build-analysis
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.analysis
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_ANALYSIS_IMAGE}:latest
      - .

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BLOG_IMAGE}:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_ANALYSIS_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY

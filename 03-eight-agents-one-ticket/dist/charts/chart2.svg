<svg class="viz" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 348" width="760" height="348" role="img" aria-label="Diff size in lines changed per strategy." font-family="system-ui, -apple-system, sans-serif">
<style>.viz{--surface:#fcfcfb;--ink:#0b0b0b;--ink2:#52514e;--muted:#898781;--grid:#e1e0d9;--axis:#c3c2b7;--bar:#256abf;--accent:#256abf;--deemph:#a8a7a0;--hatch:#898781}@media (prefers-color-scheme: dark){.viz{--surface:#1a1a19;--ink:#ffffff;--ink2:#c3c2b7;--muted:#898781;--grid:#2c2c2a;--axis:#383835;--bar:#3987e5;--accent:#3987e5;--deemph:#6a6a66;--hatch:#c3c2b7}}:root[data-theme="dark"] .viz{--surface:#1a1a19;--ink:#ffffff;--ink2:#c3c2b7;--muted:#898781;--grid:#2c2c2a;--axis:#383835;--bar:#3987e5;--accent:#3987e5;--deemph:#6a6a66;--hatch:#c3c2b7}:root[data-theme="light"] .viz{--surface:#fcfcfb;--ink:#0b0b0b;--ink2:#52514e;--muted:#898781;--grid:#e1e0d9;--axis:#c3c2b7;--bar:#256abf;--accent:#256abf;--deemph:#a8a7a0;--hatch:#898781}</style>
<defs><pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="6" height="6" fill="var(--surface)"/><line x1="0" y1="0" x2="0" y2="6" stroke="var(--hatch)" stroke-width="2"/></pattern></defs>
<title>Diff size in lines changed per strategy.</title>
<rect x="0" y="0" width="760" height="348" fill="var(--surface)"/>
<text x="16" y="28" fill="var(--ink)" font-size="17" font-weight="600">Diff size per strategy</text>
<text x="16" y="48" fill="var(--ink2)" font-size="12.5">Lines changed. Spread 8.0x leanest to largest. Excluded lane hatched.</text>
<line x1="184" y1="66" x2="184" y2="302" stroke="var(--axis)" stroke-width="1"/>
<text x="172" y="97" text-anchor="end" fill="var(--ink)" font-size="13">minimal-diff</text>
<rect x="184" y="84" width="57.5" height="18" rx="4" fill="var(--bar)"/>
<text x="251.5" y="97" fill="var(--ink2)" font-size="13" font-weight="600">12 loc</text>
<text x="172" y="135" text-anchor="end" fill="var(--ink)" font-size="13">zero-dependency</text>
<rect x="184" y="122" width="105.42" height="18" rx="4" fill="var(--bar)"/>
<text x="299.42" y="135" fill="var(--ink2)" font-size="13" font-weight="600">22 loc</text>
<text x="172" y="173" text-anchor="end" fill="var(--ink)" font-size="13">type-safe</text>
<rect x="184" y="160" width="134.17" height="18" rx="4" fill="var(--bar)"/>
<rect x="182" y="157" width="138.17" height="24" rx="6" fill="none" stroke="var(--ink)" stroke-width="2"/>
<text x="328.17" y="173" fill="var(--ink2)" font-size="13" font-weight="600">28 loc</text>
<text x="386.17" y="173" fill="var(--muted)" font-size="12">winner</text>
<text x="172" y="211" text-anchor="end" fill="var(--ink)" font-size="13">most-readable</text>
<rect x="184" y="198" width="167.71" height="18" rx="4" fill="var(--bar)"/>
<text x="361.71" y="211" fill="var(--ink2)" font-size="13" font-weight="600">35 loc</text>
<text x="172" y="249" text-anchor="end" fill="var(--ink)" font-size="13">performance-first</text>
<rect x="184" y="236" width="306.67" height="18" rx="4" fill="var(--bar)"/>
<text x="500.67" y="249" fill="var(--ink2)" font-size="13" font-weight="600">64 loc</text>
<text x="172" y="287" text-anchor="end" fill="var(--ink)" font-size="13">most-defensive</text>
<rect x="184" y="274" width="460" height="18" rx="4" fill="url(#hatch)"/>
<rect x="184" y="274" width="460" height="18" rx="4" fill="none" stroke="var(--axis)" stroke-width="1"/>
<text x="654" y="287" fill="var(--ink2)" font-size="13" font-weight="600">96 loc</text>
<text x="414" y="332" text-anchor="middle" fill="var(--muted)" font-size="12">lines changed (loc)</text>
</svg>
